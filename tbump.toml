github_url = "https://github.com/maniaclab/af-mcp-platform"

[version]
current = "0.0.7"

regex = '''
  (?P<major>\d+)
  \.
  (?P<minor>\d+)
  \.
  (?P<patch>\d+)
  (rc
    (?P<candidate>\d+)
  )?
  '''

[git]
message_template = "chore: bump version 0.0.7 → {new_version}"
tag_template = "v{new_version}"

[[file]]
src = "tbump.toml"
search = "bump version {current_version} → "

[[file]]
src = "pixi.toml"
# Match only the workspace-level version line, not dependency version constraints.
search = 'version = "{current_version}"'

[[file]]
src = "portal/package.json"
search = '"version": "{current_version}"'

[[file]]
src = "charts/af-mcp-platform/Chart.yaml"
search = 'appVersion: "{current_version}"'

[[file]]
src = "charts/af-mcp-platform/Chart.yaml"
search = 'version: {current_version}'

[[field]]
name = "candidate"
default = ""
