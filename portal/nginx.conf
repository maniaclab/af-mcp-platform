server {
    listen 8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    # Allow same-origin assets + the broker API origin.
    # Operators: replace https://mcp.af.uchicago.edu with the actual broker
    # origin if it differs from the portal origin.
    # `'unsafe-inline'` allows Astro's inline island-hydration scripts. XSS surface
    # is bounded because the portal renders only build-time constants and
    # Vue-escaped typed broker responses. See #33 for the hardening follow-up
    # (build-time sha256 hash pinning).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://mcp.af.uchicago.edu; frame-ancestors 'none';" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA routing — serve index.html for all non-file paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Astro generates content-hashed filenames)
    location ~* \.(js|css|woff2?|ttf|otf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Re-apply security headers so they aren't stripped by this block
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Don't cache the entry-point HTML
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        # `'unsafe-inline'` allows Astro's inline island-hydration scripts. XSS surface
        # is bounded because the portal renders only build-time constants and
        # Vue-escaped typed broker responses. See #33 for the hardening follow-up
        # (build-time sha256 hash pinning).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://mcp.af.uchicago.edu; frame-ancestors 'none';" always;
    }
}
