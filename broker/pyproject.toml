[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "af-mcp-broker"
version = "0.1.0"
description = "Credential-brokered MCP gateway for the UChicago ATLAS Analysis Facility"
requires-python = ">=3.12"
# Dependencies are managed by pixi — see pixi.toml at the workspace root.
dependencies = []

[project.scripts]
af-mcp-broker = "af_mcp_broker.__main__:main"

[tool.hatch.build.targets.wheel]
packages = ["src/af_mcp_broker"]

[tool.hatch.metadata]
allow-direct-references = true
