# Default values for af-mcp-platform.
# This is a YAML-formatted file. Declare variables to be passed into your templates.

image:
  registry: ghcr.io/maniaclab
  broker:
    repository: af-mcp-platform-broker
    # Defaults to .Chart.AppVersion when empty
    tag: ""
    pullPolicy: IfNotPresent
  portal:
    repository: af-mcp-platform-portal
    # Defaults to .Chart.AppVersion when empty
    tag: ""
    pullPolicy: IfNotPresent

# List of imagePullSecrets to add to all pods (name references only)
imagePullSecrets: []
# - name: my-registry-secret

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  annotations: {}

# RBAC (Role + RoleBinding) for the broker's ServiceAccount: it mints x509
# proxies via ephemeral k8s Jobs and needs to manage those Jobs/Pods.
rbac:
  create: true

# ---------------------------------------------------------------------------
# Broker: FastAPI (/v1 REST) + FastMCP aggregator (/mcp) — same pod
# ---------------------------------------------------------------------------
broker:
  replicaCount: 2

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 2Gi

  # Extra environment variables merged into the broker container.
  # These supplement the env vars derived from broker.oidc.* below.
  # Format: key: value (rendered as EnvVars with name/value pairs)
  env: {}
  # MY_EXTRA_VAR: "some-value"

  # OIDC configuration — rendered as env vars in the broker container. The
  # broker validates via JWKS + iss/aud/exp, all standard OIDC; any
  # OIDC-compliant issuer works, not just Keycloak.
  oidc:
    issuer: "https://keycloak-prod.tempest.uchicago.edu/realms/connect"
    audience: "mcp-gateway"

  # Name of a pre-existing Secret providing the AF service token.
  # The Secret must contain a key named `af-service-token`.
  # Create this via SealedSecret externally; the chart does NOT create it.
  existingServiceTokenSecret: ""

  # NFS home directory access — required by the x509 legacy credential provider.
  homeDir:
    enabled: true
    # How the home directory volume is provided:
    #   pvc      — use an existing PersistentVolumeClaim (recommended for prod)
    #   csi      — inline CSI volume (e.g. NFS CSI driver)
    #   hostPath — host path directly (dev/testing only; not safe for prod)
    mode: pvc
    # Name of the PVC when mode=pvc
    claimName: "af-user-homes"
    mountPath: "/data/homes"
    # Host path to bind-mount when mode=hostPath (dev/testing only).
    hostPath: "/data/homes"
    readOnly: true
    # The root path inside the container where user homes are expected.
    # The broker uses this to construct per-user paths: {homeRoot}/{username}
    homeRoot: "/data/homes"
    # CSI-specific fields (only used when mode=csi)
    csi:
      driver: ""
      volumeAttributes: {}

  # Per-uid proxy tmpfs — scratch space for x509 proxy files.
  # Avoids writing grid proxies to the container overlay filesystem.
  tmpfsProxy:
    enabled: true
    mountPath: "/run/broker/proxies"
    sizeLimit: "64Mi"

  # Client ID Metadata Document (CIMD, draft-ietf-oauth-client-id-metadata-
  # document) served at /.well-known/cimd, for backend OAuth 2.1 authorization
  # servers to identify this broker without per-backend Dynamic Client
  # Registration. Empty defaults — no AF-specific leak in the public chart.
  # `redirect_uris` in the served document is derived from the oauth21-direct
  # entries in identityProviders below — no separate alias list to keep in
  # sync.
  cimd:
    clientName: ""

  # Canonical origin (scheme + host, no trailing slash, e.g.
  # "https://mcp-portal.af.uchicago.edu") for every externally-visible OAuth
  # 2.1 URL the broker constructs itself: the redirect_uri sent to a backend
  # AS at authorize/callback time, and every redirect_uris entry in the CIMD
  # document above. Must be the exact origin the portal SPA is served from —
  # the linking flow's nonce cookie is host-only, so authorize and callback
  # must resolve to the same origin regardless of which ingress host a given
  # request arrived through. Empty default — no AF-specific hardcode in the
  # public chart. Required (the broker refuses to start otherwise) whenever
  # identityProviders has an oauth21-direct entry.
  publicOrigin: ""

  # Identity providers — one entry per identity provider the broker can link
  # a user's account to, either Keycloak's stored-broker-token pattern
  # (type: keycloak-brokered, e.g. ATLAS IAM) or the broker acting as a
  # direct OAuth 2.1 client (type: oauth21-direct, e.g. rucio-mcp). `alias`
  # doubles as the portal-facing id on GET /v1/identities. Empty default —
  # no AF-specific providers in the public chart.
  #
  # Consolidates the former broker.oidc.idpAlias / broker.oauth21.providers /
  # broker.cimd.idpAliases / broker.identitiesLinkClientId — see
  # docs/adding-a-backend.md for the migration.
  identityProviders: []
  # - type: keycloak-brokered
  #   alias: atlas-oidc
  #   displayName: "ATLAS IAM"
  #   enables: "VOMS proxy generation and grid certificate credential brokering"
  #   targets: ["rucio"]
  # - type: oauth21-direct
  #   alias: rucio-mcp-atlas
  #   targets: ["rucio-mcp-atlas"]
  #   authorizationEndpoint: "https://rucio-mcp.example/authorize"
  #   tokenEndpoint: "https://rucio-mcp.example/token"
  #   issuer: "https://rucio-mcp.example"
  #   scope: "openid profile email"
  #   displayName: "Rucio (ATLAS)"
  #   enables: "ATLAS Rucio operations via rucio-mcp"

  # OAuth 2.1 credential-brokering infrastructure shared by every
  # oauth21-direct entry in identityProviders above.
  oauth21:
    # Name of a pre-existing Secret providing the Fernet key (urlsafe-
    # base64-encoded 32 bytes) that encrypts the OAuth 2.1 linking flow's
    # `state` token. The Secret must contain a key named `broker-state-key`.
    # Required (non-empty) whenever identityProviders has an oauth21-direct
    # entry. Create via SealedSecret externally; the chart does NOT create it.
    existingStateKeySecret: ""
    # `iss`/`aud` self-reference embedded in the state token. Empty means
    # "use broker.oidc.issuer".
    stateIssuer: ""

    # Where OAuth 2.1 credentials (above) are persisted. "in-memory" is
    # single-replica and lost on restart; "vault" persists to a Vault/OpenBao
    # KV-v2 mount via the broker's own ServiceAccount, authenticated through
    # Vault's Kubernetes auth method. Vault/OpenBao itself is BYO — this
    # chart only consumes an existing instance, it does not deploy one.
    tokenStore:
      backend: "in-memory"  # or "vault"
      vault:
        # Vault HTTP API base URL, e.g. https://vault.example.com. Required
        # when backend="vault".
        addr: ""
        # Vault auth mount point for the Kubernetes auth method.
        authMount: "kubernetes"
        # Vault role the broker's ServiceAccount JWT is exchanged against.
        # Required when backend="vault".
        authRole: ""
        # Vault KV-v2 secrets engine mount point.
        kvMount: "secret"
        # Path prefix under the KV mount where per-subject/alias credentials
        # are stored.
        kvPathPrefix: "mcp/tokens"

# ---------------------------------------------------------------------------
# Aggregator: FastMCP backend registry
# ---------------------------------------------------------------------------
aggregator:
  # List of BackendSpec objects passed verbatim into backends.yaml.
  # Each entry should follow the FastMCP BackendSpec schema, e.g.:
  #   - name: my-tool
  #     transport: sse
  #     url: http://my-tool-svc:8000/mcp
  backends: []

# ---------------------------------------------------------------------------
# Entitlements / policy
# ---------------------------------------------------------------------------
entitlements:
  # The rendered policy.yaml is mounted at /etc/af-mcp/policy.yaml.
  # Values here override the chart's built-in ATLAS defaults.
  # Keys map to ATLAS IAM groups -> allowed capabilities/action types.
  groups: {}
  targetCapabilities: {}
  targetActionTypes: {}

# ---------------------------------------------------------------------------
# Portal: static Astro site
# ---------------------------------------------------------------------------
portal:
  replicaCount: 2

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # OIDC config for the portal SPA's own OAuth public client (Authorization
  # Code + PKCE against the issuer below; see docs/auth.md and #42). Delivered
  # to the browser at runtime via /config.json (configmap-portal-config.yaml)
  # rather than baked into the image at build time, so one built image works
  # against any realm/client/institution. REQUIRED — set in your deploying
  # values overlay (e.g. a HelmRelease), there is no safe cross-institution
  # default. Left empty, the portal skips OIDC entirely and runs in
  # unauthenticated / dev-bypass mode (see docs/local-development.md).
  oidc:
    # e.g. "https://keycloak.example.com/realms/your-realm"
    issuer: ""
    # e.g. "your-portal-client" — a public client, Client Authentication OFF,
    # Standard flow ON, PKCE S256 required.
    clientId: ""
    # openid/profile/email are OIDC-standard; append your audience-mapping
    # client scope so the access token carries the broker's expected `aud`
    # (must match broker.oidc.audience above).
    scope: "openid profile email"

  # Origin the SPA calls for the broker's /v1 and /mcp paths, and what the
  # portal's CSP connect-src allows. REQUIRED — e.g. "https://mcp.example.com".
  # Same-origin (ingress.portalHost) also works if you'd rather not expose
  # mcpHost to the browser; set this to that origin either way since it's
  # also used to build the CSP header.
  brokerOrigin: ""

# ---------------------------------------------------------------------------
# OAuth2 Proxy — forward-auth integration
# ---------------------------------------------------------------------------
oauth2Proxy:
  # URL of the EXISTING shared oauth2-proxy (traefik-triton namespace).
  # All ingress routes use this as the nginx auth-url.
  forwardAuthUrl: "http://oauth2-proxy.traefik-triton.svc.cluster.local:4180/oauth2/auth"
  signInUrl: "https://oauth2-proxy.af.uchicago.edu/oauth2/sign_in"

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  # FQDN for the broker (REST + MCP) endpoints
  mcpHost: mcp.af.uchicago.edu
  # FQDN for the portal (static site)
  portalHost: mcp-portal.af.uchicago.edu
  # Extra annotations merged onto the Ingress. auth-url/auth-signin are derived
  # from oauth2Proxy.* below and always added; put other annotations here.
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    # Secret name for the broker TLS certificate (managed by cert-manager)
    mcpSecretName: letsencrypt-generated-af-mcp
    # Secret name for the portal TLS certificate (managed by cert-manager)
    portalSecretName: letsencrypt-generated-af-mcp-portal

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  # When enabled, deny-all ingress to broker except from ingress controller;
  # restrict broker egress to DNS, Keycloak, ATLAS IAM, backends, and Prometheus.
  enabled: true

# ---------------------------------------------------------------------------
# Prometheus ServiceMonitor
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: true
  interval: 30s
  # Namespace for the ServiceMonitor resource; defaults to the release namespace.
  namespace: ""

# ---------------------------------------------------------------------------
# Grafana Dashboard ConfigMap
# ---------------------------------------------------------------------------
grafanaDashboard:
  enabled: true
  # Namespace where the ConfigMap is deployed.
  # The Grafana sidecar (label grafana_dashboard: "1") watches this namespace.
  namespace: prom
