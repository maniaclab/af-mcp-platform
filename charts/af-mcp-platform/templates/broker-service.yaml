apiVersion: v1
kind: Service
metadata:
  name: {{ include "af-mcp-platform.broker.fullname" . }}
  labels:
    {{- include "af-mcp-platform.broker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "af-mcp-platform.broker.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
