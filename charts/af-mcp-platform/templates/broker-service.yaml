apiVersion: v1
kind: Service
metadata:
  name: {{ include "af-mcp-platform.broker.fullname" . }}
  labels:
    {{- include "af-mcp-platform.broker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "af-mcp-platform.broker.selectorLabels" . | nindent 4 }}
  ports:
    # /metrics is served on the same port as the REST/MCP API.
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
