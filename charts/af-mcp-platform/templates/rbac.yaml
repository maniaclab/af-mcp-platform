{{- if .Values.rbac.create }}
# Grants the broker's ServiceAccount permission to mint x509/VOMS proxies via
# ephemeral k8s Jobs (see docs/auth.md) and to read/attach to their pods.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "af-mcp-platform.broker.fullname" . }}
  labels:
    {{- include "af-mcp-platform.broker.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/attach"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "af-mcp-platform.broker.fullname" . }}
  labels:
    {{- include "af-mcp-platform.broker.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "af-mcp-platform.broker.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "af-mcp-platform.serviceAccountName" . }}
    namespace: {{ .Release.Namespace | quote }}
{{- end }}
