apiVersion: v1
kind: Service
metadata:
  name: {{ include "af-mcp-platform.portal.fullname" . }}
  labels:
    {{- include "af-mcp-platform.portal.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "af-mcp-platform.portal.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 8081
      targetPort: http
      protocol: TCP
