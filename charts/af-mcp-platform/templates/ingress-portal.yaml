{{- if .Values.ingress.enabled }}
# This Ingress carries oauth2-proxy annotations because portalHost serves
# browser-facing HTML and needs the ForwardAuth session gate. It ONLY serves
# `/` (the portal's static assets) — /v1 and /mcp on this host are routed by
# ingress-portal-api.yaml instead, deliberately WITHOUT oauth2-proxy in front,
# because the portal SPA is its own OAuth public client (Authorization Code +
# PKCE) and sends the broker its own `aud=mcp-gateway` Bearer directly; the
# broker validates it the same way it validates any other caller's token. See
# #42 for the full design.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "af-mcp-platform.fullname" . }}-portal
  labels:
    {{- include "af-mcp-platform.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/auth-url: {{ .Values.oauth2Proxy.forwardAuthUrl | quote }}
    # rd= must be a full URL, not just a path: oauth2-proxy treats a bare-path
    # rd as same-host and redirects back to its own host after login, which
    # 404s for anything requested on mcpHost or portalHost. $scheme://$best_http_host
    # supplies the origin so oauth2-proxy redirects back to the requesting
    # subdomain instead — allowed because whitelist_domains = [".af.uchicago.edu"]
    # in the shared oauth2-proxy config covers both hosts.
    nginx.ingress.kubernetes.io/auth-signin: {{ printf "%s?rd=$scheme://$best_http_host$escaped_request_uri" .Values.oauth2Proxy.signInUrl | quote }}
    nginx.ingress.kubernetes.io/auth-response-headers: "Authorization,X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.portalHost | quote }}
      secretName: {{ .Values.ingress.tls.portalSecretName | quote }}
  {{- end }}
  rules:
    # Portal host — everything falls through to the portal Service here.
    # ingress-portal-api.yaml routes /v1/* and /mcp/* to the broker on this
    # same host, ahead of this rule via nginx's longest-prefix matching.
    #
    # IMPORTANT: any new portal page route MUST NOT start with /v1/ or /mcp/ —
    # those prefixes are reserved for the broker and would be silently
    # shadowed on this host.
    - host: {{ .Values.ingress.portalHost | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "af-mcp-platform.portal.fullname" . }}
                port:
                  name: http
{{- end }}
