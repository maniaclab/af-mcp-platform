apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "af-mcp-platform.broker.fullname" . }}
  labels:
    {{- include "af-mcp-platform.broker.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.broker.replicaCount }}
  selector:
    matchLabels:
      {{- include "af-mcp-platform.broker.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Trigger rolling update when ConfigMaps change
        checksum/config-policy: {{ include (print $.Template.BasePath "/configmap-policy.yaml") . | sha256sum }}
        checksum/config-backends: {{ include (print $.Template.BasePath "/configmap-backends.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
      labels:
        {{- include "af-mcp-platform.broker.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "af-mcp-platform.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        # Matches the numeric uid/gid the af-mcp user is created with in
        # Containerfile.broker (kubelet requires numeric ids, not names).
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: broker
          image: {{ include "af-mcp-platform.broker.image" . | quote }}
          imagePullPolicy: {{ .Values.image.broker.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            # OIDC / Keycloak settings
            - name: OIDC_ISSUER
              value: {{ .Values.broker.keycloak.issuer | quote }}
            - name: OIDC_AUDIENCE
              value: {{ .Values.broker.keycloak.audience | quote }}
            - name: ATLAS_IAM_BROKER_ALIAS
              value: {{ .Values.broker.keycloak.atlasIamBrokerAlias | quote }}
            # Home directory root (broker constructs per-user paths from this)
            - name: HOME_ROOT
              value: {{ .Values.broker.homeDir.homeRoot | quote }}
            # Proxy tmpfs mount path
            {{- if .Values.broker.tmpfsProxy.enabled }}
            - name: PROXY_DIR
              value: {{ .Values.broker.tmpfsProxy.mountPath | quote }}
            {{- end }}
            {{- if .Values.broker.existingServiceTokenSecret }}
            - name: AF_SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.broker.existingServiceTokenSecret | quote }}
                  key: af-service-token
            {{- end }}
            # Extra env vars from values (key: value pairs)
            {{- range $key, $val := .Values.broker.env }}
            - name: {{ $key | quote }}
              value: {{ $val | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /v1/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.broker.resources | nindent 12 }}
          volumeMounts:
            - name: policy
              mountPath: /etc/af-mcp/policy.yaml
              subPath: policy.yaml
              readOnly: true
            - name: backends
              mountPath: /etc/af-mcp/backends.yaml
              subPath: backends.yaml
              readOnly: true
            {{- if .Values.broker.homeDir.enabled }}
            - name: home-dir
              mountPath: {{ .Values.broker.homeDir.mountPath | quote }}
              readOnly: {{ .Values.broker.homeDir.readOnly }}
            {{- end }}
            {{- if .Values.broker.tmpfsProxy.enabled }}
            - name: proxy-tmpfs
              mountPath: {{ .Values.broker.tmpfsProxy.mountPath | quote }}
            {{- end }}
      volumes:
        - name: policy
          configMap:
            name: {{ include "af-mcp-platform.fullname" . }}-policy
        - name: backends
          configMap:
            name: {{ include "af-mcp-platform.fullname" . }}-backends
        {{- if .Values.broker.homeDir.enabled }}
        - name: home-dir
          {{- if eq .Values.broker.homeDir.mode "pvc" }}
          persistentVolumeClaim:
            claimName: {{ .Values.broker.homeDir.claimName | quote }}
            readOnly: {{ .Values.broker.homeDir.readOnly }}
          {{- else if eq .Values.broker.homeDir.mode "csi" }}
          csi:
            driver: {{ .Values.broker.homeDir.csi.driver | quote }}
            {{- with .Values.broker.homeDir.csi.volumeAttributes }}
            volumeAttributes:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- else if eq .Values.broker.homeDir.mode "hostPath" }}
          # WARNING: hostPath is for local development only. Never use in production.
          hostPath:
            path: {{ .Values.broker.homeDir.hostPath | quote }}
            type: Directory
          {{- end }}
        {{- end }}
        {{- if .Values.broker.tmpfsProxy.enabled }}
        - name: proxy-tmpfs
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.broker.tmpfsProxy.sizeLimit | quote }}
        {{- end }}
