{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "af-mcp-platform.fullname" . }}
  labels:
    {{- include "af-mcp-platform.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/auth-url: {{ .Values.oauth2Proxy.forwardAuthUrl | quote }}
    nginx.ingress.kubernetes.io/auth-signin: {{ printf "%s?rd=$escaped_request_uri" .Values.oauth2Proxy.signInUrl | quote }}
    nginx.ingress.kubernetes.io/auth-response-headers: "Authorization,X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.mcpHost | quote }}
      secretName: {{ .Values.ingress.tls.mcpSecretName | quote }}
    - hosts:
        - {{ .Values.ingress.portalHost | quote }}
      secretName: {{ .Values.ingress.tls.portalSecretName | quote }}
  {{- end }}
  rules:
    # Broker host — routes /v1 (REST API) and /mcp (FastMCP aggregator)
    - host: {{ .Values.ingress.mcpHost | quote }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "af-mcp-platform.broker.fullname" . }}
                port:
                  name: http
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "af-mcp-platform.broker.fullname" . }}
                port:
                  name: http
    # Portal host — the Astro build is a static site, and its API client fetches
    # /v1/* same-origin (see portal/src/lib/api.ts). Without these two paths,
    # those requests fall through to nginx's SPA try_files fallback and get
    # index.html back instead of JSON. So /v1 and /mcp are routed to the same
    # broker Service here as on mcpHost, and everything else falls through to
    # the portal. Longest-prefix matching means /v1/* and /mcp/* win over /.
    #
    # IMPORTANT: any new portal page route MUST NOT start with /v1/ or /mcp/ —
    # those prefixes are reserved for the broker and would be silently
    # shadowed on this host.
    - host: {{ .Values.ingress.portalHost | quote }}
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ include "af-mcp-platform.broker.fullname" . }}
                port:
                  name: http
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: {{ include "af-mcp-platform.broker.fullname" . }}
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "af-mcp-platform.portal.fullname" . }}
                port:
                  name: http
{{- end }}
