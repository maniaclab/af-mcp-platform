apiVersion: v1
kind: Pod
metadata:
  name: {{ include "af-mcp-platform.fullname" . }}-test-connection
  labels:
    {{- include "af-mcp-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: test
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          wget -qO- http://{{ include "af-mcp-platform.broker.fullname" . }}:8080/v1/healthz && echo "healthz OK"
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        runAsUser: 65534
        capabilities:
          drop:
            - ALL
