apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "af-mcp-platform.portal.fullname" . }}
  labels:
    {{- include "af-mcp-platform.portal.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.portal.replicaCount }}
  selector:
    matchLabels:
      {{- include "af-mcp-platform.portal.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "af-mcp-platform.portal.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "af-mcp-platform.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        # nginxinc/nginx-unprivileged's built-in nginx user/group.
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: portal
          image: {{ include "af-mcp-platform.portal.image" . | quote }}
          imagePullPolicy: {{ .Values.image.portal.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
          volumeMounts:
            # readOnlyRootFilesystem blocks all writes to the image's own
            # filesystem; nginx needs somewhere to put its pid file (/tmp) and
            # its temp/cache dirs (/var/cache/nginx) even when serving only
            # static files.
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
