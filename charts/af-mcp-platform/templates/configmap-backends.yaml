apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "af-mcp-platform.fullname" . }}-backends
  labels:
    {{- include "af-mcp-platform.labels" . | nindent 4 }}
data:
  backends.yaml: |
    # FastMCP aggregator backend registry.
    # Each entry is a BackendSpec; the broker mounts this at /etc/af-mcp/backends.yaml.
    backends:
    {{- if .Values.aggregator.backends }}
      {{- toYaml .Values.aggregator.backends | nindent 4 }}
    {{- else }}
      [] # No backends configured; set aggregator.backends in your values overlay.
    {{- end }}
