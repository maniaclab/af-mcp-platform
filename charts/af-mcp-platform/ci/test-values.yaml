# Values chart-testing's `ct lint` (see .github/workflows/chart-lint.yaml)
# renders the chart with, so the `required` OIDC/broker-origin fields in
# values.yaml (which have no safe cross-institution default) don't fail CI.
# These are placeholder example.com values, not a real deployment — actual
# values are provided by the operator's HelmRelease overlay, not this chart.
portal:
  oidc:
    issuer: "https://keycloak.example.com/realms/example"
    clientId: "example-portal-client"
    scope: "openid profile email example-audience"
  brokerOrigin: "https://mcp.example.com"

# Exercises the identityProviders template path in CI (both provider types)
# so a broken IDENTITY_PROVIDERS render is caught by `helm template`, not
# just by eyeballing the diff. `existingStateKeySecret` only needs to name a
# Secret for template rendering — it doesn't need to exist for `helm
# lint`/`helm template` to succeed.
broker:
  # Dummy value so `helm template` renders the BROKER_PUBLIC_ORIGIN env var
  # path exercised below (an oauth21-direct identityProviders entry requires
  # it, per the broker's own startup validation).
  publicOrigin: "https://portal.example.com"
  identityProviders:
    - type: keycloak-brokered
      alias: atlas-oidc-example
      displayName: "ATLAS IAM (example)"
      enables: "Example VOMS proxy generation and grid certificate credential brokering"
      targets: ["rucio-example"]
    - type: oauth21-direct
      alias: rucio-mcp-example
      targets: ["rucio-mcp-example"]
      authorizationEndpoint: "https://rucio-mcp.example.com/authorize"
      tokenEndpoint: "https://rucio-mcp.example.com/token"
      issuer: "https://rucio-mcp.example.com"
      displayName: "Rucio (example)"
      enables: "Example Rucio operations via rucio-mcp"
  oauth21:
    existingStateKeySecret: "example-broker-state-key"
    # Exercises the Vault-backend template path in CI (`helm template` only
    # -- these dummy values don't need a reachable Vault). See
    # `tokenStore.backend` in values.yaml.
    tokenStore:
      backend: "vault"
      vault:
        addr: "https://vault.example.com"
        authRole: "af-mcp-broker-example"
