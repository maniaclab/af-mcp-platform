# Zensical configuration for the AF MCP Platform documentation site.
#
# Build with:  zensical build            (outputs to ./site/)
# Preview with: zensical serve
#
# The site is deployed to GitHub Pages by .github/workflows/docs.yaml.

[project]

site_name = "AF MCP Platform"
site_description = "Credential-brokered MCP gateway for the UChicago ATLAS Analysis Facility."
site_author = "UChicago ATLAS Analysis Facility"
site_url = "https://maniaclab.github.io/af-mcp-platform/"

repo_url = "https://github.com/maniaclab/af-mcp-platform"
repo_name = "maniaclab/af-mcp-platform"
# The default is `edit/master/…` — point at `main` since that's this repo's
# default branch. Applies to both the "edit" and "view" content actions.
edit_uri = "edit/main/docs/"

copyright = """
Copyright &copy; 2026 The AF MCP Platform authors
"""

# Explicit nav — the docs/ tree is flat, so we spell it out here rather than
# rely on filesystem-order discovery.
nav = [
  { "Home" = "index.md" },
  { "Architecture" = "architecture.md" },
  { "Authentication" = "auth.md" },
  { "Adding a Backend" = "adding-a-backend.md" },
  { "agentgateway Spike" = "agentgateway-spike.md" },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]

language = "en"

features = [
  "announce.dismiss",
  "content.action.edit",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

# Dark scheme first so the site defaults to dark; users can flip to light.
[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# ----------------------------------------------------------------------------
# Markdown extensions — the bootstrap defaults, which are the same set
# Material for MkDocs enables. Kept explicit so config drift is visible.
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
