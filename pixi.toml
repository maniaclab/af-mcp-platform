[workspace]
name = "af-mcp-platform"
version = "0.0.1"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.12,<3.13"

[feature.broker.dependencies]
fastapi = ">=0.115"
uvicorn = ">=0.30"
pydantic = ">=2.7"
pydantic-settings = ">=2.3"
pyjwt = ">=2.8"
cryptography = ">=42"
httpx = ">=0.27"
structlog = ">=24.4"
fastmcp = ">=2.0"
prometheus-fastapi-instrumentator = ">=7.0"
kubernetes_asyncio = ">=30.0"
pyyaml = ">=6.0"

[feature.broker.pypi-dependencies]
# Editable install triggers hatch-vcs to generate _version.py from git tags.
af-mcp-broker = {path = "broker/", editable = true}

[feature.dev.dependencies]
pytest = ">=8.0"
pytest-asyncio = ">=0.23"
pytest-cov = ">=5.0"
anyio = ">=4.0"
ruff = ">=0.4"
mypy = ">=1.10"
pre-commit = ">=3.7"
httpx = ">=0.27"
tbump = ">=6.7.0"
httpx2 = ">=2.7.0,<3"

[feature.broker.tasks]
broker = { cmd = "uvicorn af_mcp_broker.app:app --host 0.0.0.0 --port 8080 --reload", description = "Run broker dev server" }

# Each task name must be defined in exactly one feature: pixi resolves
# duplicate names across features nondeterministically.
[feature.dev.tasks]
lint = { cmd = "ruff check broker && ruff format --check broker", description = "Ruff lint + format check" }
fmt = { cmd = "ruff format broker && ruff check --fix broker", description = "Format and auto-fix broker source" }
typecheck = { cmd = "mypy broker/src", description = "Type-check broker source" }
pre-commit = { cmd = "pre-commit run --all-files", description = "Run pre-commit hooks on all files" }
lint-all = { depends-on = ["lint", "typecheck", "pre-commit"], description = "Everything the CI lint job runs" }
test = { cmd = "pytest broker/ -v", description = "Broker unit tests" }
test-spikes = { cmd = "pytest spikes/ -v", description = "Spike validation tests" }
test-all = { cmd = "pytest broker/ spikes/ -v --cov=af_mcp_broker --cov-report=xml --cov-report=term-missing", description = "All tests with coverage" }
check = { depends-on = ["lint", "typecheck", "test"], description = "Quick check: lint + typecheck + broker tests" }
check-all = { depends-on = ["lint-all", "test-all"], description = "Full check: all linting + all tests with coverage" }

[environments]
broker = {features = ["broker"], solve-group = "default"}
dev = {features = ["broker", "dev"], solve-group = "default"}
default = {features = ["broker", "dev"], solve-group = "default"}
