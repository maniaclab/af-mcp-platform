[workspace]
name = "af-mcp-platform"
version = "0.0.13"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.12,<3.13"

[feature.broker.dependencies]
fastapi = ">=0.115"
uvicorn = ">=0.30"
pydantic = ">=2.7"
pydantic-settings = ">=2.3"
pyjwt = ">=2.8"
cryptography = ">=42"
httpx2 = ">=2.7.0,<3"
structlog = ">=24.4"
fastmcp = ">=2.0"
prometheus-fastapi-instrumentator = ">=7.0"
kubernetes_asyncio = ">=30.0"
pyyaml = ">=6.0"

[feature.broker.pypi-dependencies]
# Editable install triggers hatch-vcs to generate _version.py from git tags.
af-mcp-broker = {path = "broker/", editable = true}

[feature.dev.dependencies]
pytest = ">=8.0"
pytest-asyncio = ">=0.23"
pytest-cov = ">=5.0"
anyio = ">=4.0"
ruff = ">=0.4"
mypy = ">=1.10"
pre-commit = ">=3.7"
tbump = ">=6.7.0"
httpx2 = ">=2.7.0,<3"

[feature.broker.tasks]
broker = { cmd = "uvicorn af_mcp_broker.app:app --host 0.0.0.0 --port 8080 --reload", description = "Run broker dev server" }

# ---------------------------------------------------------------------------
# Portal (Astro / Vue / Tailwind) — Node comes from conda-forge. Every task
# `cwd`s into portal/ so `pixi run -e portal dev` behaves identically to
# `cd portal && npm run dev`. Task names live only under `feature.portal` to
# avoid the nondeterministic-name-resolution issue documented above.
# ---------------------------------------------------------------------------
[feature.portal.dependencies]
nodejs = ">=20"

[feature.portal.tasks]
install = { cmd = "npm install", cwd = "portal", description = "Install portal npm dependencies", inputs = ["portal/package.json", "portal/package-lock.json"], outputs = ["portal/node_modules/.package-lock.json"] }
dev = { cmd = "npm run dev", cwd = "portal", depends-on = ["install"], description = "Start portal dev server at http://localhost:4321" }
build = { cmd = "npm run build", cwd = "portal", depends-on = ["install"], description = "Build portal static site to portal/dist/", inputs = ["portal/src/**", "portal/public/**", "portal/astro.config.mjs", "portal/tsconfig.json", "portal/src/styles/**"], outputs = ["portal/dist/"] }
preview = { cmd = "npm run preview", cwd = "portal", depends-on = ["build"], description = "Serve production portal build locally" }
astro-check = { cmd = "npm run check", cwd = "portal", depends-on = ["install"], description = "Run `astro check` (types + template diagnostics)" }
format = { cmd = "npx prettier --write .", cwd = "portal", depends-on = ["install"], description = "Auto-format portal source" }
format-check = { cmd = "npx prettier --check .", cwd = "portal", depends-on = ["install"], description = "Verify portal source is prettier-formatted (CI-safe)" }
lint = { cmd = "npx eslint .", cwd = "portal", depends-on = ["install"], description = "Lint portal source with eslint-plugin-astro" }
test = { cmd = "npx vitest run", cwd = "portal", depends-on = ["install"], description = "Run portal vitest suite" }
check = { depends-on = ["format-check", "lint", "astro-check", "test"], description = "Full portal CI check: format + lint + astro check + tests" }

# Each task name must be defined in exactly one feature: pixi resolves
# duplicate names across features nondeterministically.
[feature.docs.dependencies]
zensical = "*"
lychee = "*"
pydocstyle = "*"

[feature.docs.tasks]
docs-build = { cmd = "zensical build", description = "Build documentation (static)", inputs = ["docs/", "zensical.toml"], outputs = ["site"] }
docs-linkcheck = { cmd = "lychee docs/", description = "Check documentation for broken links" }
docs-serve = { cmd = "zensical serve", depends-on = ["docs-build"], description = "Build and serve documentation" }
docs-clean = { cmd = "rm -rf site", description = "Clean documentation build artifacts", inputs = ["site"] }
check-docstrings = { cmd = "pydocstyle broker/src/af_mcp_broker/", description = "Check docstring style" }

[feature.dev.tasks]
lint = { cmd = "ruff check broker && ruff format --check broker", description = "Ruff lint + format check" }
fmt = { cmd = "ruff format broker && ruff check --fix broker", description = "Format and auto-fix broker source" }
typecheck = { cmd = "mypy broker/src", description = "Type-check broker source" }
pre-commit = { cmd = "pre-commit run --all-files", description = "Run pre-commit hooks on all files" }
lint-all = { depends-on = ["lint", "typecheck", "pre-commit"], description = "Everything the CI lint job runs" }
test = { cmd = "pytest broker/ -v", description = "Broker unit tests" }
test-spikes = { cmd = "pytest spikes/ -v", description = "Spike validation tests" }
test-all = { cmd = "pytest broker/ spikes/ -v --cov=af_mcp_broker --cov-report=xml --cov-report=term-missing", description = "All tests with coverage" }
check = { depends-on = ["lint", "typecheck", "test"], description = "Quick check: lint + typecheck + broker tests" }
check-all = { depends-on = ["lint-all", "test-all"], description = "Full check: all linting + all tests with coverage" }

# ---------------------------------------------------------------------------
# Local-dev bypass: `pixi run -e bypass broker` starts uvicorn with the auth
# bypass activated so the portal can click through without oauth2-proxy in
# front. See docs/local-development.md for the full workflow. The activation
# env is documented rather than baked into any chart / container / CI env.
# ---------------------------------------------------------------------------
[feature.bypass.activation.env]
BROKER_DEV_INSECURE_PRINCIPAL = '{"uid":1000,"gid":1000,"unixname":"devuser","email":"dev@localhost","groups":["af-users"]}'
OIDC_ISSUER = "http://localhost:8081/realms/dev"

[environments]
broker = {features = ["broker"], solve-group = "default"}
dev = {features = ["broker", "dev"], solve-group = "default"}
portal = {features = ["portal"], no-default-feature = true}
bypass = {features = ["broker", "bypass"], solve-group = "default"}
docs = {features = ["docs"], solve-group = "default"}
