[project]
name = "af-mcp-platform"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.12,<3.13"

[feature.broker.dependencies]
fastapi = ">=0.115"
uvicorn = ">=0.30"
pydantic = ">=2.7"
pydantic-settings = ">=2.3"
python-jose = ">=3.3"

[feature.broker.pypi-dependencies]
# uvicorn[standard] brings httptools + uvloop; python-jose[cryptography] brings the crypto backend.
# conda-forge packages don't support pip extras syntax, so these live here.
uvicorn = {version = ">=0.30", extras = ["standard"]}
python-jose = {version = ">=3.3", extras = ["cryptography"]}
httpx = ">=0.27"
structlog = ">=24.4"
fastmcp = ">=2.0"
prometheus-fastapi-instrumentator = ">=7.0"
python-multipart = ">=0.0.9"
cachetools = ">=5.3"
kubernetes = ">=30.0"
pyyaml = ">=6.0"

[feature.dev.dependencies]
pytest = ">=8.0"
pytest-asyncio = ">=0.23"
pytest-cov = ">=5.0"
anyio = ">=4.0"
ruff = ">=0.4"
mypy = ">=1.10"
pre-commit = ">=3.7"
httpx = ">=0.27"

[feature.broker.tasks]
broker = "uvicorn af_mcp_broker.app:app --host 0.0.0.0 --port 8080 --reload"
test = "pytest broker/src -v"
lint = "ruff check broker/src && ruff format --check broker/src"
fmt = "ruff format broker/src && ruff check --fix broker/src"
typecheck = "mypy broker/src"

[feature.dev.tasks]
test-broker = {cmd = "pytest broker/ -v", depends-on = []}
test-spikes = {cmd = "pytest spikes/ -v", depends-on = []}
pre-commit-run = "pre-commit run --all-files"

[environments]
broker = {features = ["broker"], solve-group = "default"}
dev = {features = ["broker", "dev"], solve-group = "default"}
default = {features = ["broker", "dev"], solve-group = "default"}
