name: Chart lint

on:
  pull_request:
    paths:
      - "charts/**"

jobs:
  chart-lint:
    name: Helm lint + template + ct lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # chart-testing needs full history to detect changed charts

      - uses: azure/setup-helm@v4
        with:
          version: "3.19.5"

      - uses: helm/chart-testing-action@v2.8.0

      # portal.oidc.* and portal.brokerOrigin are `required` (no safe
      # cross-institution default, see values.yaml) — ci/test-values.yaml
      # supplies placeholder values so lint/template can render.
      - name: helm lint
        run: helm lint charts/af-mcp-platform -f charts/af-mcp-platform/ci/test-values.yaml

      - name: helm template (dry-run)
        run: |
          helm template af-mcp-platform charts/af-mcp-platform \
            --debug \
            -f charts/af-mcp-platform/ci/test-values.yaml \
            --set image.broker.tag=sha-test \
            --set image.portal.tag=sha-test

      - name: ct lint
        run: ct lint --target-branch ${{ github.event.repository.default_branch }} --check-version-increment=false
