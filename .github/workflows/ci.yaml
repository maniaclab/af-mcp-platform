name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.1
          environments: dev

      - name: Lint
        run: pixi run -e dev lint-all

  test-broker:
    name: Broker tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.1
          environments: dev

      - name: Run tests with coverage
        run: pixi run -e dev test-all

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  portal-check:
    name: Portal check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      # `/v1/*` and `/mcp/*` are reserved for the broker on the portal host
      # (see docs/architecture.md "Reserved paths on the portal host"). A page
      # under those prefixes would be silently shadowed by the ingress
      # rewrite. Fail fast rather than let it merge.
      - name: Guard reserved portal paths
        working-directory: portal/src/pages
        run: |
          hits=$(find . -mindepth 1 \( -name 'v1' -o -name 'mcp' -o -name 'v1.*' -o -name 'mcp.*' \) \
                 -o -path './v1/*' -o -path './mcp/*' 2>/dev/null || true)
          if [ -n "$hits" ]; then
            echo "::error::Portal page routes must not start with /v1/ or /mcp/ (reserved for broker on portalHost)."
            echo "$hits"
            exit 1
          fi

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.1
          environments: portal

      # Runs prettier --check, eslint, astro check, and vitest — the same
      # aggregate command a developer runs locally before a PR.
      - name: Portal check (format + lint + astro check + tests)
        run: pixi run -e portal check

      - name: Build portal
        run: pixi run -e portal build
