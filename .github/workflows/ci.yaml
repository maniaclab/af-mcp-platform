name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.1
          environments: dev

      - name: Lint
        run: pixi run -e dev lint

  test-broker:
    name: Broker tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.1
          environments: dev

      - name: Run tests with coverage
        run: pixi run -e dev test-all

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  portal-build:
    name: Portal build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4

      - name: Install dependencies
        working-directory: portal
        run: npm install

      - name: Build
        working-directory: portal
        run: npm run build
