name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.0
          environments: dev

      - name: pre-commit
        run: pixi run -e dev pre-commit-run

      - name: Ruff lint
        run: pixi run -e dev lint

      - name: mypy
        run: pixi run -e dev typecheck

  test-broker:
    name: Broker tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.41.0
          environments: dev

      - name: Run broker tests with coverage
        run: |
          pixi run -e dev python -m pytest broker/ -v \
            --cov=af_mcp_broker \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  portal-build:
    name: Portal build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

      - name: Install dependencies
        working-directory: portal
        run: npm install

      - name: Build
        working-directory: portal
        run: npm run build

  chart-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: "3.15.0"

      - name: helm lint
        run: helm lint charts/af-mcp-platform
